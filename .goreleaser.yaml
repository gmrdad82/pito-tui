version: 2
project_name: pito-tui

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/pito-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/gmrdad82/pito-tui/internal/version.Version={{.Version}}
      - -X github.com/gmrdad82/pito-tui/internal/version.Commit={{.ShortCommit}}
      - -X github.com/gmrdad82/pito-tui/internal/version.Date={{.CommitDate}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs"
      - "\\[skipci\\]"

nfpms:
  - package_name: pito-tui
    formats: [deb]
    maintainer: "Catalin Ilinca <gmrdad82@gmail.com>"
    homepage: https://github.com/gmrdad82/pito-tui
    license: AGPL-3.0-only
    description: |-
      Terminal client for PITO, the self-hosted YouTube channel manager.
      One scrollback, one prompt, the server-side grammar, live over
      ActionCable.
    section: utils
    # Sound cues play through whichever is present; neither is required —
    # the client is silent without them.
    recommends:
      - mpv

