# Homebrew tap — one formula serves BOTH macOS and Linux (casks are
# macOS-only, so the deprecated-but-supported formula path is deliberate).
# Needs the gmrdad82/homebrew-tap repo and a TAP_GITHUB_TOKEN secret (a
# fine-grained PAT with contents:write on that one repo — the workflow's
# own GITHUB_TOKEN cannot push to a sibling repository).
brews:
  - name: pito-tui
    repository:
      owner: gmrdad82
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/gmrdad82/pito-tui
    description: "Terminal client for PITO, the self-hosted YouTube channel manager"
    license: AGPL-3.0-only
    skip_upload: auto
    install: |
      bin.install "pito-tui"
    test: |
      system "#{bin}/pito-tui", "version"

release:
  footer: |
    ---
    **Install** — Arch/Omarchy: `yay -S pito-tui-bin` · macOS/Linux: `brew install gmrdad82/tap/pito-tui` · Ubuntu/Debian: download the `.deb` above, then `sudo apt install ./pito-tui_*.deb`
